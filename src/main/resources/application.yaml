# ─────────────────────────────────────────────────────────────────────────────
# FILE: src/main/resources/application.yml
#
# Payment Service — DeezyWallet
#
# PROFILES: base → local | docker | prod
#
# PCI DSS NOTES:
#   - All gateway credentials (Stripe secret key, webhook secrets, Razorpay
#     key/secret) MUST be provided via environment variables or Vault.
#     They are NEVER committed as plaintext to this file.
#   - In local/docker: ${STRIPE_SECRET_KEY} resolved from .env file.
#   - In prod: Kubernetes Secret → environment variable injection.
#   - This file must pass a secrets-scanning CI step (e.g. truffleHog).
#
# SERVICE PORTS (convention: 808{n}):
#   User Service       → 8081
#   Wallet Service     → 8082
#   Transaction Service→ 8083
#   Payment Service    → 8084  ← this service
#   Notification       → 8085
#   Fraud              → 8090
# ─────────────────────────────────────────────────────────────────────────────

# ═════════════════════════════════════════════════════════════════════════════
# BASE — shared across all profiles
# ═════════════════════════════════════════════════════════════════════════════

spring:
  application:
    name: payment-service

  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    baseline-on-migrate: false

  # ── Kafka producer only ───────────────────────────────────────────────────
  kafka:
    producer:
      key-serializer:   org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        spring.json.add.type.headers: false
        # No type headers — Wallet Service and Ledger Service consume
        # payment.events; both should route on eventType field, not Java headers.

  data:
    redis:
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
          max-wait: 1000ms

server:
  port: 8084
  compression:
    enabled: true
    mime-types: application/json
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized

# ── JWT (resource server — validates only) ────────────────────────────────────
jwt:
  issuer: deezy-wallet-platform
  # secret: SET PER PROFILE

# ── Downstream service URLs ───────────────────────────────────────────────────
services:
  user-service:
    base-url: http://user-service:8081
  wallet-service:
    base-url: http://wallet-service:8082
  fraud-service:
    base-url: http://fraud-service:8090
  internal-jwt: ""  # ROLE_INTERNAL_SERVICE JWT — SET PER PROFILE

# ── Gateway credentials — all SET PER PROFILE (never in base) ─────────────────
# gateways.stripe.secret-key, gateways.stripe.webhook-secret
# gateways.razorpay.key-id, gateways.razorpay.key-secret, gateways.razorpay.webhook-secret
# gateways.npci.merchant-id, gateways.npci.api-key

# ── Kafka topic names ─────────────────────────────────────────────────────────
kafka:
  topics:
    payment-events: payment.events

# ── Scheduling ────────────────────────────────────────────────────────────────
payment:
  expiry-job:
    interval-ms: 60000   # ThreeDsExpiryJob runs every 60 seconds

# ── Async executor ────────────────────────────────────────────────────────────
spring.task.execution:
  pool:
    core-size: 4
    max-size: 8
    queue-capacity: 100
  thread-name-prefix: payment-async-


# ═════════════════════════════════════════════════════════════════════════════
# LOCAL PROFILE
# ═════════════════════════════════════════════════════════════════════════════
---
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:mysql://localhost:3306/payment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: PaymentServicePool-Local
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 900000

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092

jwt:
  secret: bG9jYWwtZGV2LXNlY3JldC1mb3ItcGF5bWVudC1zZXJ2aWNlLW5vdC1wcm9kdWN0aW9uLTY0Ynl0ZXM=

# Gateway credentials — local dev / Stripe test mode
# Use Stripe test keys: https://stripe.com/docs/testing
gateways:
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
    base-url: https://api.stripe.com
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
    key-secret: ${RAZORPAY_KEY_SECRET:placeholder}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:placeholder}
    base-url: https://api.razorpay.com
  npci:
    merchant-id: ${NPCI_MERCHANT_ID:DZYWLT001}
    api-key: ${NPCI_API_KEY:placeholder}
    base-url: https://api.npci.org.in

services:
  user-service:
    base-url: http://localhost:8081
  wallet-service:
    base-url: http://localhost:8082
  fraud-service:
    base-url: http://localhost:8090
  internal-jwt: "Bearer dev-internal-service-token"

logging:
  level:
    root: INFO
    com.deezywallet.payment: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    org.springframework.security: DEBUG
    org.springframework.kafka: INFO
    org.flywaydb: INFO

server:
  port: 8084


# ═════════════════════════════════════════════════════════════════════════════
# DOCKER PROFILE
# ═════════════════════════════════════════════════════════════════════════════
---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:mysql://mysql:3306/payment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    # payment_db — separate schema: database-per-service pattern
    username: ${MYSQL_USER:wallet_user}
    password: ${MYSQL_PASSWORD:wallet_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: PaymentServicePool-Docker
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 900000

  data:
    redis:
      host: redis
      port: 6379

  kafka:
    bootstrap-servers: kafka:9092

jwt:
  secret: ${JWT_SECRET}

gateways:
  stripe:
    secret-key: ${STRIPE_SECRET_KEY}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET}
  razorpay:
    key-id: ${RAZORPAY_KEY_ID}
    key-secret: ${RAZORPAY_KEY_SECRET}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET}
  npci:
    merchant-id: ${NPCI_MERCHANT_ID}
    api-key: ${NPCI_API_KEY}

services:
  user-service:
    base-url: http://user-service:8081
  wallet-service:
    base-url: http://wallet-service:8082
  fraud-service:
    base-url: http://fraud-service:8090
  internal-jwt: ${INTERNAL_SERVICE_JWT}

logging:
  level:
    root: WARN
    com.deezywallet.payment: INFO
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSS} %-5level [%15t] %-40logger{39} : %m%n"

server:
  port: 8084


# ═════════════════════════════════════════════════════════════════════════════
# PROD PROFILE
# ═════════════════════════════════════════════════════════════════════════════
---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATASOURCE_URL}
    # jdbc:mysql://payment-db.prod.internal:3306/payment_db?useSSL=true&requireSSL=true&serverTimezone=UTC
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: PaymentServicePool-Prod
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      # 60s leak detection — gateway calls inside @Transactional can hold
      # connections for up to 10s (GATEWAY_TIMEOUT_MS). Flag anything >60s.
      validation-timeout: 5000
      keepalive-time: 60000

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true
        # TLS required — Redis stores gateway idempotency locks and 3DS URLs.
        # These are payment-sensitive data; plaintext Redis is unacceptable in prod.
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      properties:
        security.protocol: SASL_SSL
        sasl.mechanism: PLAIN
        sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG}

  jpa:
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false

jwt:
  secret: ${JWT_SECRET}

# ── Gateway credentials — all from Kubernetes Secrets ────────────────────────
# PCI DSS requirement: credentials never in plaintext in source control.
# Each var maps to a Kubernetes Secret mounted as an env var.
gateways:
  stripe:
    secret-key: ${STRIPE_SECRET_KEY}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET}
    base-url: https://api.stripe.com
  razorpay:
    key-id: ${RAZORPAY_KEY_ID}
    key-secret: ${RAZORPAY_KEY_SECRET}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET}
    base-url: https://api.razorpay.com
  npci:
    merchant-id: ${NPCI_MERCHANT_ID}
    api-key: ${NPCI_API_KEY}
    base-url: https://api.npci.org.in

services:
  user-service:
    base-url: ${USER_SERVICE_URL}
  wallet-service:
    base-url: ${WALLET_SERVICE_URL}
  fraud-service:
    base-url: ${FRAUD_SERVICE_URL}
  internal-jwt: ${INTERNAL_SERVICE_JWT}

# ── Tighter scheduling in prod ────────────────────────────────────────────────
payment:
  expiry-job:
    interval-ms: 30000   # Run every 30s in prod — faster expiry detection

logging:
  level:
    root: WARN
    com.deezywallet.payment: WARN
    org.flywaydb: INFO
  pattern:
    console: '{"time":"%d{yyyy-MM-dd'\''T'\''HH:mm:ss.SSSZ}","level":"%level","service":"payment-service","logger":"%logger{36}","message":"%message","thread":"%thread"}%n'

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  server:
    port: 8086
    # Actuator on port 8086 — same as other services.
    # Not exposed through API Gateway.

server:
  port: ${SERVER_PORT:8084}
  compression:
    enabled: true
    mime-types: application/json
    min-response-size: 1024
